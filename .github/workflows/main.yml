name: Build YTools APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: |
          # هاد السطر غيكري المجلد ويحط فيه الملفات إلى ملقاهومش
          mkdir -p www
          [ -f index.html ] && mv index.html www/ || echo "index.html already in www"
          
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init YTools com.ytools.pro --web-dir www --confirm
          npx cap add android
          npx cap copy
          cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: YTools-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
